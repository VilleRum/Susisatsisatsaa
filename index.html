<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="utf-8" />
    <title>Wolf–Moose – Coexistence & Conflict</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Layer tree CSS (qgis2web) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.control.layers.tree@1.0.0/L.Control.Layers.Tree.css">


    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        #map {
            width: 100%;
            height: 100%;
        }

.legend {
    background: white;
    padding: 10px;
    border-radius: 4px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
    width: 120px;
    text-align: center;
}

/* Palkki + numerot samassa pystykontissa */
.legend-body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    height: 200px; /* sama kuin palkin korkeus */
    margin-top: 5px;
}

/* Pystypalkki */
.legend-bar {
    width: 20px;
    height: 200px;
    border: 1px solid #333;
}
.legend-bar.turbo {
    background: linear-gradient(
        to bottom,
        #30123b,
        #4145ab,
        #2db7b0,
        #7ad151,
        #fde725,
        #ff7c00
    );
}
.legend-bar.bw {
    background: linear-gradient(
        to bottom,
        #000000,
        #555555,
        #888888,
        #bbbbbb,
        #ffffff
    );
}

    </style>
</head>
<body>
    <div id="map"></div>

    <!-- Piilotetut legendapohjat (HTML) -->
    <div id="legend-templates" style="display:none;">

        <!-- Coexistence Index (Turbo) -->
        <div class="legend turbo-legend-coexist">
            <div class="legend-title">Coexistence Index</div>
             <span class="legend-min">0.501</span>
            <div class="legend-bar turbo"></div>
             <span class="legend-max">1.407</span>
            <div class="legend-labels">
            </div>
        </div>

        <!-- Conflict Index (Turbo) -->
        <div class="legend turbo-legend-conflict">
            <div class="legend-title">Conflict Index</div>
            <span class="legend-min">0.000</span>
            <div class="legend-bar turbo"></div>
             <span class="legend-max">0.976</span>
            <div class="legend-labels">
            </div>
        </div>

        <!-- Wolf SDM (Black → White) -->
        <div class="legend bw-legend">
            <div class="legend-title">Wolf SDM</div>
            <span class="legend-min">0.000</span>
            <div class="legend-bar bw"></div>
            <span class="legend-max">1.000</span>
            <div class="legend-labels">
            </div>
        </div>

    </div>

    <!-- Kirjastot (samat kuin QGIS2Web yleensä käyttää) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.1/proj4.js"></script>
<script src="https://unpkg.com/proj4leaflet@1.0.2/src/proj4leaflet.js"></script>
<script src="https://unpkg.com/leaflet-hash@0.2.1/leaflet-hash.js"></script>
   <script src="https://unpkg.com/leaflet.control.layers.tree@1.0.0/L.Control.Layers.Tree.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/autolinker/3.15.0/Autolinker.min.js"></script>

    <!-- VARSINAINEN SCRIPT -->
    <script>
    var highlightLayer;
    function highlightFeature(e) {
        highlightLayer = e.target;
        highlightLayer.openPopup();
    }


    var map = L.map('map', {
        zoomControl: false,
        maxZoom: 19
    });

    var hash = new L.Hash(map);
    map.attributionControl.setPrefix(
        '<a href="https://github.com/qgis2web/qgis2web" target="_blank">qgis2web</a> · ' +
        '<a href="https://leafletjs.com">Leaflet</a> · <a href="https://qgis.org">QGIS</a>'
    );

    var autolinker = new Autolinker({ truncate: { length: 30, location: 'smart' } });

    var zoomControl = L.control.zoom({ position: 'topleft' }).addTo(map);

    var bounds_group = new L.featureGroup([]);

    function setBounds() {
        if (bounds_group.getLayers().length) {
            map.fitBounds(bounds_group.getBounds());
        }
        map.setMaxBounds(map.getBounds());
        map.setMinZoom(map.getZoom());
    }

    /* BASEMAP + RASTERIT */

        map.createPane('pane_ESRIGraydark_0');
        map.getPane('pane_ESRIGraydark_0').style.zIndex = 400;
        var layer_ESRIGraydark_0 = L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Base/MapServer/tile/{z}/{y}/{x}', {
            pane: 'pane_ESRIGraydark_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 20
        });
        layer_ESRIGraydark_0;
        map.addLayer(layer_ESRIGraydark_0);
    map.createPane('pane_wolfsdm');
    map.getPane('pane_wolfsdm').style.zIndex = 401;
    var layer_wolfsdmmoosealignedclipped_1 = L.imageOverlay(
        'data/wolfmoosesdm_3.png',
        [[59.65974440260699,21.024999999999995],[60.75,23.444936327108636]],
        { pane: 'pane_wolfsdm' }
    );
    map.addLayer(layer_wolfsdmmoosealignedclipped_1);

    map.createPane('pane_conflict');
    map.getPane('pane_conflict').style.zIndex = 402;
    var layer_clippedconflictindex_2 = L.imageOverlay(
        'data/clipconflictreproject_2.png',
        [[59.641556946595436,20.913168285934262],[60.809065308579896,23.489027094706117]],
        { pane: 'pane_conflict' }
    );
    map.addLayer(layer_clippedconflictindex_2);

    map.createPane('pane_coexist');
    map.getPane('pane_coexist').style.zIndex = 403;
    var layer_clippedcoexistenceindex_3 = L.imageOverlay(
        'data/clipcoexistencereproject_1.png',
        [[59.641556946595436,20.913168285934262],[60.809065308579896,23.489027094706117]],
        { pane: 'pane_coexist' }
    );
    map.addLayer(layer_clippedcoexistenceindex_3);

    /* LAYER TREE */

    var overlaysTree = [
        { label: "clipped-coexistence-index", layer: layer_clippedcoexistenceindex_3 },
        { label: "clipped-conflict-index", layer: layer_clippedconflictindex_2 },
        { label: "wolf-sdm-moose-aligned-clipped", layer: layer_wolfsdmmoosealignedclipped_1 },
        { label: "ESRI Gray", layer: layer_ESRIGraydark_0, radioGroup: 'bm' }
    ];

    var lay = L.control.layers.tree(null, overlaysTree, { collapsed: false });
    lay.addTo(map);

    /* ImageOverlay bounds fix */

    L.ImageOverlay.include({
        getBounds: function () {
            return this._bounds;
        }
    });

    /* LEGEND CONTROL (vaihtuva) */

    var legendControl = L.control({ position: 'bottomright' });

    legendControl.onAdd = function () {
        var div = L.DomUtil.create('div');
        div.innerHTML = "";
        return div;
    };

    legendControl.addTo(map);
// ALWAYS SHOW ALL LEGENDS
legendControl.getContainer().innerHTML = `
    <div style="margin-bottom: 15px;">
        ${document.querySelector('.turbo-legend-coexist').innerHTML}
    </div>
    <div style="margin-bottom: 15px;">
        ${document.querySelector('.turbo-legend-conflict').innerHTML}
    </div>
    <div>
        ${document.querySelector('.bw-legend').innerHTML}
    </div>
`;

    setBounds();
    </script>
</body>
</html>
